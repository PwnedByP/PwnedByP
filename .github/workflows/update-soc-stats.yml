name: Update Professional Metrics

on:
  push:
    paths:
      - 'stats.json'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Run Update Script
        run: python scripts/update_stats.py
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          # This [skip ci] is the "Safety Lock" that prevents the infinite loop
          commit_message: "Update SOC Metrics [skip ci]"
