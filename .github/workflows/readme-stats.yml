name: Generate Readme Stats

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Featured Projects
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: PwnedByP
          template: classic
          # 'base: ""' removes the generic profile stats (followers, etc.)
          base: "" 
          filename: featured-projects.svg
          config_timezone: Europe/Madrid
          
          # This enables the specific repository cards
          plugin_repositories: yes
          plugin_repositories_featured: Mini-SIEM, Python
